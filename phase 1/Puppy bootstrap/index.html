<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Bootstrap</title>
    <link rel="stylesheet" href="css/bootstrap.css" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="blueBg text-center p-3">
      <h1>PuppyLovers Page</h1>
    </header>
    <section class="mb-5">
      <img src="images/banner-puppies.jpg" alt="" />
    </section>
    <section class="container">
      <div class="row">
        <div class="mb-5 col-md-4 mb-md-0">
          <img src="images/puppy-1.jpg" alt="" />
        </div>
        <div class="d-none d-md-block col-md-4 missing fs-3 pt-5 text-center">
          <p class="pt-5"><span>Puppy</span>
            <span>Missing</span>
            <span>Here!!</span>
          </p>
        </div>
        <div class="col-md-4">
          <img src="images/puppy-2.jpg" alt="" />
        </div>
      </div>
    </section>

    <section class="my-5 text-center">
      <h2 class="fw-bold fs-2">More Puppies</h2>
    </section>

    <section class="container">
      <div class="row">
        <div class="mb-5 col-md-6 mb-md-3">
          <img src="images/puppy-3.jpg" alt="" />
        </div>
        <div class="mb-5 col-md-6 mb-md-3">
          <img src="images/puppy-4.jpg" alt="" />
        </div>
      </div>
    </section>
    <footer class="blueBg text-center p-5 fs-5 fw-bold">
      <p class="">Developed by Eman Mohammednur</p>
    </footer>
  </body>
</html>
